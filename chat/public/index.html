<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOCK</title>
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #21262d;
      --border:  #30363d;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --accent:  #00bcd4;
      --accent2: #0097a7;
      --danger:  #f85149;
      --success: #3fb950;
      --warn:    #d29922;
      --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      --mono:    'Cascadia Code', 'Consolas', 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 230px; min-width: 230px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-size: 17px; font-weight: 800; letter-spacing: 4px; color: var(--accent);
    }
    .logo-sub { font-size: 9px; color: var(--text2); letter-spacing: 1px; margin-top: 1px; }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .section-label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 1.2px;
      color: var(--text2); padding: 10px 14px 5px; text-transform: uppercase;
    }
    .sidebar-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .agent-item {
      padding: 7px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 9px;
      border-radius: 6px; margin: 1px 6px;
      transition: background 0.1s; font-size: 13px;
    }
    .agent-item:hover { background: var(--bg3); }
    .agent-item.active { background: var(--bg3); }
    .agent-item.active .agent-name { color: var(--accent); }
    .agent-emoji { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .agent-name  { flex: 1; font-weight: 500; }
    .agent-tag   { font-size: 9px; color: var(--text2); background: var(--bg); padding: 1px 5px; border-radius: 8px; }

    .history-item {
      padding: 6px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      border-radius: 6px; margin: 1px 6px;
      transition: background 0.1s; font-size: 12px; color: var(--text2);
    }
    .history-item:hover { background: var(--bg3); color: var(--text); }
    .history-item.active { background: var(--bg3); color: var(--text); }
    .history-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-del {
      opacity: 0; font-size: 14px; color: var(--text2); cursor: pointer; padding: 0 2px;
      transition: opacity 0.1s, color 0.1s;
    }
    .history-item:hover .history-del { opacity: 1; }
    .history-del:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex-shrink: 0; }
    .status-dot.online  { background: var(--success); }
    .status-dot.offline { background: var(--danger); }
    .status-text { font-size: 11px; color: var(--text2); }

    /* ── Chat area ───────────────────────────────────────────── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .chat-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .chat-header-emoji { font-size: 20px; }
    .chat-header-name  { font-size: 15px; font-weight: 600; }
    .chat-header-model {
      font-size: 11px; color: var(--text2);
      background: var(--bg3); padding: 2px 8px; border-radius: 10px;
    }
    .header-spacer { flex: 1; }
    .clear-btn {
      font-size: 11px; color: var(--text2); background: none; border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

    .messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    .message { display: flex; gap: 10px; max-width: 820px; }
    .message.user      { flex-direction: row-reverse; align-self: flex-end; }
    .message.assistant { align-self: flex-start; width: 100%; }

    .message-avatar {
      width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .message.user .message-avatar      { background: var(--accent2); color: var(--bg); font-size: 11px; }
    .message.assistant .message-avatar { background: var(--bg3); border: 1px solid var(--border); }

    .message-content {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 13px;
      line-height: 1.65; font-size: 14px;
      max-width: calc(100% - 40px);
    }
    .message.user .message-content { background: #1a2433; border-color: #2a3a50; }

    /* Markdown */
    .message-content p        { margin: 0 0 8px; }
    .message-content p:last-child { margin: 0; }
    .message-content h1, .message-content h2, .message-content h3 { margin: 10px 0 5px; }
    .message-content code {
      background: var(--bg3); padding: 1px 5px; border-radius: 3px;
      font-family: var(--mono); font-size: 12px;
    }
    .message-content pre {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0;
    }
    .message-content pre code { background: none; padding: 0; }
    .message-content ul, .message-content ol { padding-left: 20px; margin: 6px 0; }
    .message-content li { margin: 2px 0; }
    .message-content blockquote {
      border-left: 3px solid var(--accent); padding-left: 10px; color: var(--text2); margin: 6px 0;
    }
    .message-content table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .message-content th, .message-content td { border: 1px solid var(--border); padding: 5px 9px; }
    .message-content th { background: var(--bg3); }
    .message-content a { color: var(--accent); text-decoration: none; }
    .message-content a:hover { text-decoration: underline; }
    .message-content hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .message-content.streaming::after {
      content: '▌'; color: var(--accent);
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text2); user-select: none;
    }
    .empty-logo { font-size: 40px; font-weight: 800; letter-spacing: 10px; color: var(--border); }
    .empty-hint { font-size: 13px; }

    /* ── Input ───────────────────────────────────────────────── */
    .input-area {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; display: flex; align-items: flex-end;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 14px;
      padding: 9px 12px; resize: none; max-height: 180px; min-height: 40px; line-height: 1.5;
    }
    #input::placeholder { color: var(--text2); }
    .send-btn {
      width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
      background: var(--accent); border: none; color: var(--bg);
      cursor: pointer; margin: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div>
      <div class="logo">FLOCK</div>
      <div class="logo-sub">Claude Max × OpenClaw</div>
    </div>
    <button class="icon-btn" id="new-chat-btn" title="新对话">+</button>
  </div>

  <div class="sidebar-scroll">
    <div class="section-label">Agents</div>
    <div id="agent-list"></div>

    <div class="section-label" style="margin-top:6px">History</div>
    <div id="history-list"></div>
  </div>

  <div class="sidebar-footer">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">检测中...</span>
  </div>
</aside>

<main class="chat-area">
  <div class="chat-header">
    <span class="chat-header-emoji" id="header-emoji">🤖</span>
    <span class="chat-header-name"  id="header-name">Main</span>
    <span class="chat-header-model" id="header-model">claude-sonnet-4-6</span>
    <span class="header-spacer"></span>
    <button class="clear-btn" id="clear-btn">清空对话</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">FLOCK</div>
      <div class="empty-hint">选择一个 Agent 开始对话</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
    </div>
    <button class="send-btn" id="send-btn" title="发送">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
// ── UUID helper (persistent per agent for Claude --session-id) ───
function getAgentSessionId(agentId) {
  const key = `flock_sid_${agentId}`;
  let sid = localStorage.getItem(key);
  if (!sid) {
    sid = crypto.randomUUID();
    localStorage.setItem(key, sid);
  }
  return sid;
}

// ── Default agents ───────────────────────────────────────────────
const DEFAULT_AGENTS = [
  { id:'main', name:'Main', emoji:'🤖', model:'claude-sonnet-4-6', desc:'通用助手' },
  { id:'pm',   name:'PM',   emoji:'📋', model:'claude-opus-4-6',   desc:'产品经理' },
  { id:'dev',  name:'Dev',  emoji:'💻', model:'claude-sonnet-4-6', desc:'开发工程师' },
  { id:'qa',   name:'QA',   emoji:'🧪', model:'claude-sonnet-4-6', desc:'测试工程师' },
];

// ── State ────────────────────────────────────────────────────────
let agents = JSON.parse(localStorage.getItem('flock_agents') || 'null') || DEFAULT_AGENTS;
let currentAgentId  = localStorage.getItem('flock_agent') || 'main';
let conversations   = JSON.parse(localStorage.getItem('flock_convs') || '{}');
let currentConvId   = null;
let isStreaming      = false;

// ── Helpers ──────────────────────────────────────────────────────
const getAgent = id => agents.find(a => a.id === id) || agents[0];

const getConvs = agentId =>
  Object.values(conversations)
    .filter(c => c.agentId === agentId)
    .sort((a, b) => b.updatedAt - a.updatedAt);

const saveConvs = () => localStorage.setItem('flock_convs', JSON.stringify(conversations));

function newConv(agentId) {
  const id = `c${Date.now()}`;
  conversations[id] = { id, agentId, title:'新对话', messages:[], createdAt:Date.now(), updatedAt:Date.now() };
  saveConvs();
  return id;
}

function md(text) {
  if (typeof marked !== 'undefined') {
    try { return marked.parse(text, { breaks:true, gfm:true }); } catch(e) {}
  }
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

const scrollBottom = () => {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
};

// ── Render sidebar ───────────────────────────────────────────────
function renderAgents() {
  document.getElementById('agent-list').innerHTML = agents.map(a => `
    <div class="agent-item ${a.id===currentAgentId?'active':''}" data-id="${a.id}">
      <span class="agent-emoji">${a.emoji}</span>
      <span class="agent-name">${a.name}</span>
      <span class="agent-tag">${a.model.replace('claude-','').replace('-4-6','').replace('-4.6','')}</span>
    </div>`).join('');
  document.querySelectorAll('.agent-item').forEach(el =>
    el.addEventListener('click', () => selectAgent(el.dataset.id)));
}

function renderHistory() {
  const convs = getConvs(currentAgentId);
  const list  = document.getElementById('history-list');
  if (!convs.length) {
    list.innerHTML = '<div style="padding:5px 14px;font-size:11px;color:var(--text2)">暂无历史</div>';
    return;
  }
  list.innerHTML = convs.map(c => `
    <div class="history-item ${c.id===currentConvId?'active':''}" data-id="${c.id}">
      <span class="history-title">${c.title}</span>
      <span class="history-del" data-del="${c.id}" title="删除">×</span>
    </div>`).join('');
  list.querySelectorAll('.history-item').forEach(el =>
    el.addEventListener('click', e => {
      if (e.target.dataset.del) { delConv(e.target.dataset.del); return; }
      loadConv(el.dataset.id);
    }));
}

// ── Agent selection ──────────────────────────────────────────────
function selectAgent(id) {
  currentAgentId = id;
  localStorage.setItem('flock_agent', id);
  const a = getAgent(id);
  document.getElementById('header-emoji').textContent = a.emoji;
  document.getElementById('header-name').textContent  = a.name;
  document.getElementById('header-model').textContent = a.model;
  renderAgents();
  renderHistory();
  const convs = getConvs(id);
  convs.length ? loadConv(convs[0].id) : showEmpty();
}

function showEmpty() {
  currentConvId = null;
  const m = document.getElementById('messages');
  const a = getAgent(currentAgentId);
  m.innerHTML = `<div class="empty-state" id="empty-state">
    <div class="empty-logo">FLOCK</div>
    <div class="empty-hint">和 ${a.emoji} ${a.name} 开始对话</div>
  </div>`;
}

// ── Conversation management ──────────────────────────────────────
function loadConv(id) {
  currentConvId = id;
  renderHistory();
  const conv = conversations[id];
  if (!conv) return;
  const m = document.getElementById('messages');
  m.innerHTML = '';
  conv.messages.forEach(msg =>
    msg.role === 'user' ? appendUser(msg.content) : appendBot(msg.content));
  scrollBottom();
}

function delConv(id) {
  delete conversations[id];
  saveConvs();
  if (currentConvId === id) showEmpty();
  renderHistory();
}

// ── Message rendering ────────────────────────────────────────────
function appendUser(text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'message user';
  d.innerHTML = `<div class="message-avatar">你</div>
    <div class="message-content">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  m.appendChild(d);
}

function appendBot(text) {
  const m = document.getElementById('messages');
  const a = getAgent(currentAgentId);
  const d = document.createElement('div');
  d.className = 'message assistant';
  d.innerHTML = `<div class="message-avatar">${a.emoji}</div>
    <div class="message-content">${md(text)}</div>`;
  m.appendChild(d);
  return d.querySelector('.message-content');
}

// ── Send ─────────────────────────────────────────────────────────
async function send() {
  if (isStreaming) return;
  const input = document.getElementById('input');
  const text  = input.value.trim();
  if (!text) return;

  if (!currentConvId) {
    currentConvId = newConv(currentAgentId);
    renderHistory();
  }

  const conv  = conversations[currentConvId];
  const agent = getAgent(currentAgentId);

  document.getElementById('empty-state')?.remove();

  conv.messages.push({ role:'user', content:text });
  conv.updatedAt = Date.now();
  if (conv.messages.length === 1)
    conv.title = text.slice(0, 28) + (text.length > 28 ? '…' : '');
  saveConvs();

  appendUser(text);
  input.value = '';
  input.style.height = 'auto';
  scrollBottom();
  renderHistory();

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  const contentEl = appendBot('');
  contentEl.classList.add('streaming');
  scrollBottom();

  let full = '';

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer max-subscription',
      },
      body: JSON.stringify({
        model:    agent.model,
        stream:   true,
        user:     getAgentSessionId(agent.id),
        messages: conv.messages.slice(0, -1).concat([{ role:'user', content:text }]),
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const delta = JSON.parse(data)?.choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            contentEl.innerHTML = md(full);
            scrollBottom();
          }
        } catch {}
      }
    }
  } catch(err) {
    full = `⚠ ${err.message}`;
    contentEl.innerHTML = `<span style="color:var(--danger)">${full}</span>`;
  }

  contentEl.classList.remove('streaming');
  conv.messages.push({ role:'assistant', content:full });
  conv.updatedAt = Date.now();
  saveConvs();
  renderHistory();

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── Status check ─────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/v1/models', {
      headers: { 'Authorization':'Bearer max-subscription' },
      signal: AbortSignal.timeout(3000),
    });
    const ok = r.ok;
    document.getElementById('status-dot').className  = `status-dot ${ok?'online':'offline'}`;
    document.getElementById('status-text').textContent = ok ? 'MaxProxy 在线' : 'MaxProxy 离线';
  } catch {
    document.getElementById('status-dot').className  = 'status-dot offline';
    document.getElementById('status-text').textContent = 'MaxProxy 离线';
  }
}

// ── Events ───────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', send);

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  setTimeout(() => autoResize(e.target), 0);
});
document.getElementById('input').addEventListener('input', e => autoResize(e.target));

document.getElementById('new-chat-btn').addEventListener('click', () => {
  currentConvId = null;
  showEmpty();
  renderHistory();
  document.getElementById('input').focus();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!currentConvId) return;
  const conv = conversations[currentConvId];
  if (!conv || !conv.messages.length) return;
  if (!confirm('清空这个对话的所有消息？')) return;
  conv.messages = [];
  conv.title = '新对话';
  conv.updatedAt = Date.now();
  saveConvs();
  showEmpty();
  renderHistory();
});

// ── Init ─────────────────────────────────────────────────────────
renderAgents();
selectAgent(currentAgentId);
checkStatus();
setInterval(checkStatus, 30000);
document.getElementById('input').focus();
</script>
</body>
</html>
