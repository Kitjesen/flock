<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOCK</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #21262d;
      --border:  #30363d;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --accent:  #00bcd4;
      --accent2: #0097a7;
      --danger:  #f85149;
      --success: #3fb950;
      --warn:    #d29922;
      --radius:  8px;
      --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      --mono:    'Cascadia Code', 'Consolas', 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 232px; min-width: 232px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { font-size: 17px; font-weight: 800; letter-spacing: 4px; color: var(--accent); }
    .status { display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex-shrink: 0; }
    .status-dot.online  { background: var(--success); }
    .status-dot.offline { background: var(--danger); }
    .status-text { font-size: 11px; color: var(--text2); }

    .new-chat-btn {
      margin: 10px 10px 4px;
      padding: 7px 10px;
      background: var(--accent); color: #000;
      border: none; border-radius: var(--radius);
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      flex-shrink: 0; transition: background 0.15s;
    }
    .new-chat-btn:hover { background: var(--accent2); }

    .section-label {
      padding: 10px 14px 4px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text2); flex-shrink: 0;
    }
    .agent-list { display: flex; flex-direction: column; gap: 1px; padding: 0 8px; flex-shrink: 0; }
    .agent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s; position: relative;
    }
    .agent-item:hover { background: var(--bg3); }
    .agent-item.active { background: var(--bg3); }
    .agent-emoji { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .agent-name  { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agent-tag   { font-size: 10px; color: var(--text2); background: var(--bg); padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
    .agent-edit  { font-size: 11px; color: var(--text2); opacity: 0; padding: 2px 5px; cursor: pointer; border-radius: 3px; flex-shrink: 0; border: none; background: transparent; }
    .agent-item:hover .agent-edit { opacity: 1; }
    .agent-edit:hover { background: var(--border); color: var(--text); }

    .add-agent-btn {
      display: flex; align-items: center; gap: 6px;
      margin: 2px 8px; padding: 6px 8px; border-radius: 6px;
      color: var(--text2); font-size: 12px; cursor: pointer; border: none;
      background: transparent; transition: background 0.12s; width: calc(100% - 16px);
    }
    .add-agent-btn:hover { background: var(--bg3); color: var(--text); }

    /* system prompt */
    .sysprompt-wrap {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; margin: 6px 0;
    }
    .sysprompt-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; cursor: pointer; user-select: none;
      font-size: 10px; color: var(--text2); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .sysprompt-toggle:hover { color: var(--text); }
    .sysprompt-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
    .sysprompt-toggle.open svg { transform: rotate(180deg); }
    .sysprompt-body { padding: 0 8px 8px; display: none; }
    .sysprompt-body.open { display: block; }
    .sysprompt-body textarea {
      width: 100%; height: 80px; resize: vertical;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 11px;
      font-family: var(--mono); padding: 6px 8px; line-height: 1.5;
    }
    .sysprompt-body textarea:focus { outline: none; border-color: var(--accent); }
    .sysprompt-body textarea::placeholder { color: var(--text2); }

    /* history */
    .history-wrap { flex: 1; overflow-y: auto; padding-bottom: 8px; }
    .history-list { display: flex; flex-direction: column; gap: 1px; padding: 0 8px; }
    .history-item {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: background 0.12s;
    }
    .history-item:hover { background: var(--bg3); }
    .history-item.active { background: var(--bg3); }
    .history-title { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-del { font-size: 14px; color: var(--text2); opacity: 0; padding: 0 2px; flex-shrink: 0; line-height: 1; }
    .history-item:hover .history-del { opacity: 1; }
    .history-del:hover { color: var(--danger); }

    /* ── Main ────────────────────────────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .chat-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); flex-shrink: 0;
    }
    .chat-header-left { display: flex; align-items: center; gap: 8px; }
    .chat-header-emoji { font-size: 18px; }
    .chat-header-name  { font-size: 15px; font-weight: 600; }
    .chat-header-model {
      font-size: 11px; color: var(--accent);
      background: rgba(0,188,212,0.1); border: 1px solid rgba(0,188,212,0.25);
      padding: 2px 8px; border-radius: 3px; font-family: var(--mono);
    }
    .header-actions { display: flex; align-items: center; gap: 2px; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--text2); padding: 5px 7px; border-radius: 5px;
      font-size: 14px; transition: background 0.12s, color 0.12s; display: flex; align-items: center;
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }

    /* messages */
    #messages { flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 2px; }
    .message { display: flex; gap: 10px; padding: 8px 18px; }
    .message:hover { background: rgba(255,255,255,0.018); }
    .message-avatar {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .message.user .message-avatar { background: var(--accent2); font-size: 11px; font-weight: 700; }
    .message.assistant .message-avatar { background: var(--bg3); }
    .message-content { flex: 1; min-width: 0; font-size: 14px; line-height: 1.65; padding-top: 4px; }
    .message-content p { margin-bottom: 8px; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol { margin: 4px 0 8px 18px; }
    .message-content li { margin-bottom: 3px; }
    .message-content h1, .message-content h2, .message-content h3 { margin: 14px 0 6px; font-weight: 600; }
    .message-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }
    .message-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .message-content th, .message-content td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
    .message-content th { background: var(--bg3); font-weight: 600; }
    .message-content a { color: var(--accent); text-decoration: none; }
    .message-content a:hover { text-decoration: underline; }
    .message-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* inline code */
    .message-content code:not(pre code) {
      background: var(--bg3); border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 4px;
      font-family: var(--mono); font-size: 12.5px; color: #ff7b72;
    }

    /* code blocks */
    .code-block-wrap { position: relative; margin: 10px 0; }
    .code-block-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #161b22; border: 1px solid var(--border);
      border-bottom: none; border-radius: 6px 6px 0 0;
      padding: 5px 12px;
    }
    .code-lang { font-size: 11px; color: var(--text2); font-family: var(--mono); }
    .copy-btn {
      font-size: 11px; background: transparent; border: none;
      color: var(--text2); cursor: pointer; padding: 2px 8px;
      border-radius: 4px; transition: background 0.12s, color 0.12s;
    }
    .copy-btn:hover { background: var(--border); color: var(--text); }
    .copy-btn.copied { color: var(--success); }
    .code-block-wrap pre {
      margin: 0; border-radius: 0 0 6px 6px;
      border: 1px solid var(--border); overflow-x: auto;
    }
    .code-block-wrap pre code { border-radius: 0 0 6px 6px; font-size: 12.5px !important; }
    .hljs { padding: 12px 14px !important; }

    /* streaming cursor */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .streaming::after { content:'▋'; animation:blink 0.8s infinite; font-size:13px; color:var(--accent); margin-left:1px; }

    /* empty state */
    #messages .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      padding: 40px; text-align: center; min-height: 300px;
    }
    .empty-logo { font-size: 36px; font-weight: 900; letter-spacing: 8px; color: var(--bg3); }
    .empty-hint { font-size: 13px; color: var(--text2); }
    .empty-shortcuts { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .shortcut-row { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 8px; justify-content: center; }
    .kbd { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--text); }

    /* input area */
    .input-area { border-top: 1px solid var(--border); background: var(--bg); padding: 10px 14px 12px; flex-shrink: 0; }
    .input-row { display: flex; align-items: flex-end; gap: 8px; }
    #input {
      flex: 1; resize: none; height: 40px; min-height: 40px; max-height: 160px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 13.5px;
      font-family: var(--font); padding: 9px 12px; line-height: 1.5;
      transition: border-color 0.15s;
    }
    #input:focus { outline: none; border-color: var(--accent); }
    #input::placeholder { color: var(--text2); }
    .send-btn {
      height: 40px; padding: 0 16px;
      background: var(--accent); color: #000;
      border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 5px; padding: 0 2px;
    }
    .char-count { font-size: 11px; color: var(--text2); min-width: 20px; }
    .input-hint  { font-size: 11px; color: var(--text2); }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; width: 460px; max-width: 96vw; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    .modal-close { background: transparent; border: none; cursor: pointer; color: var(--text2); font-size: 20px; padding: 0 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 14px 16px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

    /* form */
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px;
      padding: 7px 10px; font-family: var(--font);
    }
    .form-row textarea { resize: vertical; height: 80px; font-size: 12px; font-family: var(--mono); line-height: 1.5; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--accent); }
    .form-row select option { background: var(--bg3); }
    .form-two { display: grid; grid-template-columns: 64px 1fr; gap: 10px; }

    /* agent cards */
    .agent-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 8px; transition: border-color 0.12s;
    }
    .agent-card:hover { border-color: var(--text2); }
    .agent-card-emoji { font-size: 22px; flex-shrink: 0; }
    .agent-card-info { flex: 1; min-width: 0; }
    .agent-card-name  { font-size: 13px; font-weight: 600; }
    .agent-card-model { font-size: 11px; color: var(--text2); font-family: var(--mono); }
    .agent-card-desc  { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agent-card-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* buttons */
    .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: var(--accent);   color: #000; }
    .btn-secondary { background: var(--bg3);       color: var(--text); border-color: var(--border); }
    .btn-danger    { background: transparent;      color: var(--danger); border-color: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
  </style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────── -->
<div class="sidebar">
  <div class="sidebar-header">
    <span class="logo">FLOCK</span>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">检测中...</span>
    </div>
  </div>

  <button class="new-chat-btn" id="new-chat-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新对话
  </button>

  <div class="section-label">助手</div>
  <div class="agent-list" id="agent-list"></div>
  <button class="add-agent-btn" id="add-agent-btn">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    添加助手
  </button>

  <div class="sysprompt-wrap">
    <div class="sysprompt-toggle" id="sysprompt-toggle">
      <span>系统提示词</span>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="sysprompt-body" id="sysprompt-body">
      <textarea id="sysprompt-input" placeholder="对 AI 的角色和规则描述...（留空为默认行为）"></textarea>
    </div>
  </div>

  <div class="section-label">历史</div>
  <div class="history-wrap">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<main>
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="chat-header-emoji" id="header-emoji">🤖</span>
      <span class="chat-header-name"  id="header-name">Main</span>
      <span class="chat-header-model" id="header-model">claude-sonnet-4-6</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clear-btn" title="清空当前对话">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="输入消息...（Enter 发送，Shift+Enter 换行）"></textarea>
      <button class="send-btn" id="send-btn">发送</button>
    </div>
    <div class="input-footer">
      <span class="char-count" id="char-count"></span>
      <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
    </div>
  </div>
</main>

<!-- ── Agent modal ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">管理助手</span>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- CDN scripts -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/shell.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────
const MODELS = [
  'claude-sonnet-4-6',
  'claude-opus-4-6',
  'claude-haiku-4-5-20251001',
];

const DEFAULT_AGENTS = [
  { id:'main', name:'Main', emoji:'🤖', model:'claude-sonnet-4-6', desc:'通用助手' },
  { id:'pm',   name:'PM',   emoji:'📋', model:'claude-opus-4-6',   desc:'产品经理' },
  { id:'dev',  name:'Dev',  emoji:'💻', model:'claude-sonnet-4-6', desc:'开发工程师' },
  { id:'qa',   name:'QA',   emoji:'🧪', model:'claude-sonnet-4-6', desc:'测试工程师' },
];

// ── State ────────────────────────────────────────────────────────
let agents         = JSON.parse(localStorage.getItem('flock_agents') || 'null') || DEFAULT_AGENTS;
let currentAgentId = localStorage.getItem('flock_agent') || 'main';
let conversations  = JSON.parse(localStorage.getItem('flock_convs') || '{}');
let currentConvId  = null;
let isStreaming    = false;

// ── Helpers ──────────────────────────────────────────────────────
const getAgent     = id => agents.find(a => a.id === id) || agents[0];
const getConvs     = id => Object.values(conversations).filter(c => c.agentId === id).sort((a,b) => b.updatedAt - a.updatedAt);
const saveConvs    = () => localStorage.setItem('flock_convs', JSON.stringify(conversations));
const saveAgents   = () => localStorage.setItem('flock_agents', JSON.stringify(agents));
const getSysPrompt = id => localStorage.getItem(`flock_sysprompt_${id}`) || '';
const setSysPrompt = (id, v) => v ? localStorage.setItem(`flock_sysprompt_${id}`, v) : localStorage.removeItem(`flock_sysprompt_${id}`);
const getSessionId = id => {
  const k = `flock_sid_${id}`;
  return localStorage.getItem(k) || (() => { const v = crypto.randomUUID(); localStorage.setItem(k, v); return v; })();
};

const scrollBottom = () => { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; };

// ── Code block enhancement ───────────────────────────────────────
function wrapCodeBlocks(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement?.classList.contains('code-block-wrap')) return;
    const code = pre.querySelector('code');
    if (!code) return;

    // apply highlight.js
    if (typeof hljs !== 'undefined' && !code.dataset.highlighted) {
      hljs.highlightElement(code);
    }

    const lang = (code.className.match(/language-(\w+)/) || [])[1] || 'code';
    const wrap = document.createElement('div');
    wrap.className = 'code-block-wrap';

    const header = document.createElement('div');
    header.className = 'code-block-header';
    header.innerHTML = `<span class="code-lang">${lang}</span><button class="copy-btn">复制</button>`;

    header.querySelector('.copy-btn').addEventListener('click', e => {
      const btn = e.currentTarget;
      navigator.clipboard.writeText(code.textContent || '').then(() => {
        btn.textContent = '✓ 已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        btn.textContent = '失败';
        setTimeout(() => { btn.textContent = '复制'; }, 1500);
      });
    });

    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(header);
    wrap.appendChild(pre);
  });
}

function renderMd(contentEl, text) {
  if (typeof marked !== 'undefined') {
    contentEl.innerHTML = marked.parse(text, { breaks: true, gfm: true });
  } else {
    contentEl.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  wrapCodeBlocks(contentEl);
}

// ── Conversation helpers ─────────────────────────────────────────
function newConv(agentId) {
  const id = `c${Date.now()}`;
  conversations[id] = { id, agentId, title:'新对话', messages:[], createdAt:Date.now(), updatedAt:Date.now() };
  saveConvs();
  return id;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Render sidebar ───────────────────────────────────────────────
function renderAgents() {
  document.getElementById('agent-list').innerHTML = agents.map(a => `
    <div class="agent-item ${a.id === currentAgentId ? 'active' : ''}" data-id="${a.id}">
      <span class="agent-emoji">${a.emoji}</span>
      <span class="agent-name">${a.name}</span>
      <span class="agent-tag">${a.model.replace('claude-','').replace(/-\d.*$/,'')}</span>
      <button class="agent-edit" data-edit="${a.id}" title="编辑助手">✎</button>
    </div>`).join('');
  document.querySelectorAll('.agent-item').forEach(el =>
    el.addEventListener('click', e => {
      const editId = e.target.closest('[data-edit]')?.dataset.edit;
      if (editId) { openEditAgent(editId); return; }
      selectAgent(el.dataset.id);
    }));
}

function renderHistory() {
  const convs = getConvs(currentAgentId);
  const list  = document.getElementById('history-list');
  if (!convs.length) {
    list.innerHTML = '<div style="padding:5px 14px;font-size:11px;color:var(--text2)">暂无历史</div>';
    return;
  }
  list.innerHTML = convs.map(c => `
    <div class="history-item ${c.id === currentConvId ? 'active' : ''}" data-id="${c.id}">
      <span class="history-title">${c.title}</span>
      <span class="history-del" data-del="${c.id}" title="删除">×</span>
    </div>`).join('');
  list.querySelectorAll('.history-item').forEach(el =>
    el.addEventListener('click', e => {
      if (e.target.dataset.del) { delConv(e.target.dataset.del); return; }
      loadConv(el.dataset.id);
    }));
}

// ── Agent selection ──────────────────────────────────────────────
function selectAgent(id) {
  currentAgentId = id;
  localStorage.setItem('flock_agent', id);
  const a = getAgent(id);
  document.getElementById('header-emoji').textContent = a.emoji;
  document.getElementById('header-name').textContent  = a.name;
  document.getElementById('header-model').textContent = a.model;
  document.getElementById('sysprompt-input').value    = getSysPrompt(id);
  renderAgents();
  renderHistory();
  const convs = getConvs(id);
  convs.length ? loadConv(convs[0].id) : showEmpty();
}

function showEmpty() {
  currentConvId = null;
  const a = getAgent(currentAgentId);
  document.getElementById('messages').innerHTML = `
    <div class="empty-state">
      <div class="empty-logo">FLOCK</div>
      <div class="empty-hint">和 ${a.emoji} ${a.name} 开始对话</div>
      <div class="empty-shortcuts">
        <div class="shortcut-row"><span class="kbd">Enter</span><span>发送消息</span></div>
        <div class="shortcut-row"><span class="kbd">Shift + Enter</span><span>换行</span></div>
      </div>
    </div>`;
}

// ── Conversation management ──────────────────────────────────────
function loadConv(id) {
  currentConvId = id;
  renderHistory();
  const conv = conversations[id];
  if (!conv) return;
  const m = document.getElementById('messages');
  m.innerHTML = '';
  conv.messages.forEach(msg => {
    if (msg.role === 'user') appendUser(msg.content);
    else appendBotStatic(msg.content);
  });
  scrollBottom();
}

function delConv(id) {
  delete conversations[id];
  saveConvs();
  if (currentConvId === id) showEmpty();
  renderHistory();
}

// ── Message rendering ────────────────────────────────────────────
function appendUser(text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'message user';
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  d.innerHTML = `<div class="message-avatar">你</div><div class="message-content">${esc}</div>`;
  m.appendChild(d);
}

function appendBotStatic(text) {
  const m = document.getElementById('messages');
  const a = getAgent(currentAgentId);
  const d = document.createElement('div');
  d.className = 'message assistant';
  d.innerHTML = `<div class="message-avatar">${a.emoji}</div><div class="message-content"></div>`;
  m.appendChild(d);
  const el = d.querySelector('.message-content');
  renderMd(el, text);
  return el;
}

function appendBotStreaming() {
  const m = document.getElementById('messages');
  const a = getAgent(currentAgentId);
  const d = document.createElement('div');
  d.className = 'message assistant';
  d.innerHTML = `<div class="message-avatar">${a.emoji}</div><div class="message-content streaming"></div>`;
  m.appendChild(d);
  return d.querySelector('.message-content');
}

// ── Send ─────────────────────────────────────────────────────────
async function send() {
  if (isStreaming) return;
  const input = document.getElementById('input');
  const text  = input.value.trim();
  if (!text) return;

  if (!currentConvId) {
    currentConvId = newConv(currentAgentId);
    renderHistory();
  }

  const conv  = conversations[currentConvId];
  const agent = getAgent(currentAgentId);

  document.getElementById('messages').querySelector('.empty-state')?.remove();

  conv.messages.push({ role:'user', content:text });
  conv.updatedAt = Date.now();
  if (conv.messages.length === 1) conv.title = text.slice(0, 28) + (text.length > 28 ? '…' : '');
  saveConvs();

  appendUser(text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('char-count').textContent = '';
  scrollBottom();
  renderHistory();

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  const contentEl = appendBotStreaming();
  scrollBottom();

  let full = '';
  const sysPrompt = getSysPrompt(currentAgentId);
  const msgs = [
    ...(sysPrompt ? [{ role:'system', content:sysPrompt }] : []),
    ...conv.messages.slice(0, -1),
    { role:'user', content:text },
  ];

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer max-subscription' },
      body: JSON.stringify({ model:agent.model, stream:true, user:getSessionId(agent.id), messages:msgs }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const delta = JSON.parse(data)?.choices?.[0]?.delta?.content || '';
          if (delta) { full += delta; contentEl.textContent = full; scrollBottom(); }
        } catch {}
      }
    }
  } catch (err) {
    full = `⚠ ${err.message}`;
    contentEl.innerHTML = `<span style="color:var(--danger)">${full}</span>`;
  }

  contentEl.classList.remove('streaming');
  if (full && !full.startsWith('⚠')) renderMd(contentEl, full);

  conv.messages.push({ role:'assistant', content:full });
  conv.updatedAt = Date.now();
  saveConvs();
  renderHistory();
  scrollBottom();

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── Status check ─────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/v1/models', {
      headers: { 'Authorization':'Bearer max-subscription' },
      signal: AbortSignal.timeout(3000),
    });
    const ok = r.ok;
    document.getElementById('status-dot').className   = `status-dot ${ok ? 'online' : 'offline'}`;
    document.getElementById('status-text').textContent = ok ? 'MaxProxy 在线' : 'MaxProxy 离线';
  } catch {
    document.getElementById('status-dot').className   = 'status-dot offline';
    document.getElementById('status-text').textContent = 'MaxProxy 离线';
  }
}

// ── System prompt ────────────────────────────────────────────────
document.getElementById('sysprompt-toggle').addEventListener('click', () => {
  const body   = document.getElementById('sysprompt-body');
  const toggle = document.getElementById('sysprompt-toggle');
  const open   = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
});

document.getElementById('sysprompt-input').addEventListener('input', e => {
  setSysPrompt(currentAgentId, e.target.value.trim());
});

// ── Modal helpers ─────────────────────────────────────────────────
function openModal(title, bodyHTML, footerHTML) {
  document.getElementById('modal-title').textContent  = title;
  document.getElementById('modal-body').innerHTML    = bodyHTML;
  document.getElementById('modal-footer').innerHTML  = footerHTML;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── Manage agents ─────────────────────────────────────────────────
function openManageAgents() {
  const cards = agents.map(a => `
    <div class="agent-card">
      <span class="agent-card-emoji">${a.emoji}</span>
      <div class="agent-card-info">
        <div class="agent-card-name">${a.name}</div>
        <div class="agent-card-model">${a.model}</div>
        <div class="agent-card-desc">${a.desc || ''}</div>
      </div>
      <div class="agent-card-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEditAgent('${a.id}')">编辑</button>
        ${agents.length > 1 ? `<button class="btn btn-danger btn-sm" onclick="deleteAgent('${a.id}')">删除</button>` : ''}
      </div>
    </div>`).join('');
  openModal('管理助手', cards,
    `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>
     <button class="btn btn-primary" onclick="openAddAgent()">+ 添加助手</button>`);
}

function agentFormHTML(a) {
  const opts = MODELS.map(m =>
    `<option value="${m}" ${(a?.model || MODELS[0]) === m ? 'selected' : ''}>${m}</option>`).join('');
  return `
    <div class="form-two form-row">
      <div><label>图标</label><input id="f-emoji" value="${a?.emoji||'🤖'}" maxlength="2" style="text-align:center;font-size:18px"></div>
      <div><label>名称</label><input id="f-name" value="${a?.name||''}" placeholder="助手名称"></div>
    </div>
    <div class="form-row"><label>模型</label><select id="f-model">${opts}</select></div>
    <div class="form-row"><label>描述</label><input id="f-desc" value="${a?.desc||''}" placeholder="一句话描述用途"></div>
    <div class="form-row">
      <label>系统提示词（可选）</label>
      <textarea id="f-sys" placeholder="角色设定和规则...">${a ? getSysPrompt(a.id) : ''}</textarea>
    </div>`;
}

function openAddAgent() {
  openModal('添加助手', agentFormHTML(null),
    `<button class="btn btn-secondary" onclick="openManageAgents()">取消</button>
     <button class="btn btn-primary" onclick="submitAddAgent()">添加</button>`);
}

function openEditAgent(id) {
  const a = getAgent(id);
  openModal(`编辑：${a.name}`, agentFormHTML(a),
    `<button class="btn btn-secondary" onclick="openManageAgents()">取消</button>
     <button class="btn btn-primary" onclick="submitEditAgent('${id}')">保存</button>`);
}

function submitAddAgent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const id = `a${Date.now()}`;
  agents.push({ id, name, emoji: document.getElementById('f-emoji').value.trim() || '🤖', model: document.getElementById('f-model').value, desc: document.getElementById('f-desc').value.trim() });
  setSysPrompt(id, document.getElementById('f-sys').value.trim());
  saveAgents(); renderAgents(); openManageAgents();
}

function submitEditAgent(id) {
  const idx = agents.findIndex(a => a.id === id);
  if (idx < 0) return;
  const name = document.getElementById('f-name').value.trim();
  agents[idx] = { ...agents[idx], name: name || agents[idx].name, emoji: document.getElementById('f-emoji').value.trim() || agents[idx].emoji, model: document.getElementById('f-model').value, desc: document.getElementById('f-desc').value.trim() };
  setSysPrompt(id, document.getElementById('f-sys').value.trim());
  saveAgents();
  if (id === currentAgentId) selectAgent(id); else renderAgents();
  openManageAgents();
}

function deleteAgent(id) {
  if (!confirm('删除此助手及其所有对话历史？')) return;
  agents = agents.filter(a => a.id !== id);
  Object.keys(conversations).forEach(k => { if (conversations[k].agentId === id) delete conversations[k]; });
  localStorage.removeItem(`flock_sid_${id}`);
  localStorage.removeItem(`flock_sysprompt_${id}`);
  saveAgents(); saveConvs();
  if (currentAgentId === id) selectAgent(agents[0].id); else renderAgents();
  openManageAgents();
}

// ── Events ───────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('new-chat-btn').addEventListener('click', () => { currentConvId = null; showEmpty(); renderHistory(); document.getElementById('input').focus(); });
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!currentConvId) return;
  const c = conversations[currentConvId];
  if (!c?.messages.length) return;
  if (!confirm('清空这个对话的所有消息？')) return;
  c.messages = []; c.title = '新对话'; c.updatedAt = Date.now();
  saveConvs(); showEmpty(); renderHistory();
});
document.getElementById('add-agent-btn').addEventListener('click', openAddAgent);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

const inputEl = document.getElementById('input');
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); return; }
  setTimeout(() => { autoResize(e.target); updateCharCount(); }, 0);
});
inputEl.addEventListener('input', () => { autoResize(inputEl); updateCharCount(); });
function updateCharCount() {
  const n  = inputEl.value.length;
  const el = document.getElementById('char-count');
  el.textContent = n > 0 ? `${n}` : '';
  el.style.color = n > 3000 ? 'var(--warn)' : 'var(--text2)';
}

// ── Init ─────────────────────────────────────────────────────────
if (!agents.find(a => a.id === currentAgentId)) currentAgentId = agents[0].id;
renderAgents();
selectAgent(currentAgentId);
checkStatus();
setInterval(checkStatus, 30_000);
inputEl.focus();
</script>
